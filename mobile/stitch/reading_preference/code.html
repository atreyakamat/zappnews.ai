<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;family=Inter:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#490013",
              "surface-dim": "#0e0e0e",
              "outline": "#757575",
              "on-secondary-fixed-variant": "#00586d",
              "tertiary-fixed-dim": "#ff7984",
              "on-secondary-container": "#eef9ff",
              "primary-dim": "#9547f7",
              "on-primary-container": "#330066",
              "on-tertiary-fixed-variant": "#79001f",
              "error-dim": "#d73357",
              "surface-tint": "#c59aff",
              "on-secondary": "#004050",
              "on-background": "#ffffff",
              "primary-fixed": "#ba88ff",
              "secondary-dim": "#00c0ea",
              "outline-variant": "#484848",
              "on-tertiary-container": "#000000",
              "primary-fixed-dim": "#b075ff",
              "on-primary-fixed": "#000000",
              "secondary-fixed-dim": "#37d4ff",
              "secondary-container": "#00677f",
              "tertiary-container": "#fc2a53",
              "background": "#0e0e0e",
              "surface-container-highest": "#262626",
              "on-primary-fixed-variant": "#3f007c",
              "inverse-on-surface": "#555555",
              "surface-container": "#191919",
              "primary": "#c59aff",
              "surface-container-lowest": "#000000",
              "tertiary-dim": "#e51245",
              "error-container": "#a70138",
              "on-surface": "#ffffff",
              "surface-container-high": "#1f1f1f",
              "surface": "#0e0e0e",
              "secondary": "#00cffc",
              "surface-container-low": "#131313",
              "primary-container": "#ba88ff",
              "tertiary-fixed": "#ff9197",
              "on-tertiary-fixed": "#39000a",
              "on-error-container": "#ffb2b9",
              "tertiary": "#ff6f7c",
              "inverse-primary": "#7e29df",
              "on-secondary-fixed": "#003a48",
              "error": "#ff6e84",
              "inverse-surface": "#f9f9f9",
              "secondary-fixed": "#80deff",
              "on-tertiary": "#49000f",
              "surface-bright": "#2c2c2c",
              "surface-variant": "#262626",
              "on-surface-variant": "#ababab",
              "on-primary": "#420082"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neon-glow-primary {
            box-shadow: 0 0 20px rgba(197, 154, 255, 0.15);
        }
        .neon-border-active {
            box-shadow: 0 0 15px rgba(0, 207, 252, 0.4);
            border: 1px solid rgba(0, 207, 252, 0.5);
        }
        .glass-panel {
            background: rgba(38, 38, 38, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-secondary/30">
<!-- Top AppBar (from JSON) -->
<header class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-xl flex items-center justify-between px-6 h-16 w-full shadow-[0_0_20px_rgba(124,77,255,0.1)]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-purple-400 cursor-pointer hover:opacity-80 transition-opacity active:scale-95 active:duration-100" data-icon="arrow_back">arrow_back</span>
</div>
<h1 class="font-space-grotesk tracking-tight font-bold text-xl text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-[#7C4DFF] to-[#00cffc]">ZappNews</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="min-h-screen pt-24 pb-32 px-6 max-w-2xl mx-auto flex flex-col">
<!-- Progress Bar Section -->
<div class="mb-12">
<div class="flex justify-between items-end mb-4">
<span class="text-label-sm font-bold tracking-[0.2em] text-secondary uppercase">Step 3 of 5</span>
<span class="text-on-surface-variant font-medium text-xs opacity-60">Personalization Pulse</span>
</div>
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-secondary w-3/5 rounded-full shadow-[0_0_10px_rgba(0,207,252,0.3)]"></div>
</div>
</div>
<!-- Headline Group -->
<div class="mb-12 space-y-4">
<h2 class="text-4xl md:text-5xl font-headline font-bold leading-tight tracking-tight text-white">
                Set your reading <span class="text-transparent bg-clip-text bg-gradient-to-br from-primary via-secondary to-primary-dim">pulse.</span>
</h2>
<p class="text-lg text-on-surface-variant font-light max-w-md">
                How much time do you have for daily AI updates?
            </p>
</div>
<!-- Option Cards -->
<div class="space-y-4">
<!-- Option 1: The Brief -->
<button class="w-full text-left group relative p-6 glass-panel rounded-lg border border-white/5 transition-all duration-300 hover:bg-surface-container-highest/60 hover:border-white/10 active:scale-[0.98]">
<div class="flex items-center gap-6">
<div class="h-14 w-14 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-3xl" data-icon="bolt">bolt</span>
</div>
<div>
<h3 class="text-xl font-headline font-semibold text-white">The Brief <span class="text-on-surface-variant font-normal opacity-60">(3 mins)</span></h3>
<p class="text-sm text-on-surface-variant mt-1">High-impact headlines &amp; AI summaries only.</p>
</div>
</div>
</button>
<!-- Option 2: The Deep Dive (Selected) -->
<button class="w-full text-left group relative p-6 glass-panel rounded-lg neon-border-active bg-surface-container-highest/80 transition-all duration-300 active:scale-[0.98]">
<div class="flex items-center gap-6">
<div class="h-14 w-14 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-black shadow-lg">
<span class="material-symbols-outlined text-3xl" data-icon="biotech" style="font-variation-settings: 'FILL' 1;">biotech</span>
</div>
<div>
<div class="flex items-center gap-2">
<h3 class="text-xl font-headline font-semibold text-white">The Deep Dive <span class="text-secondary/70 font-normal">(10 mins)</span></h3>
<span class="bg-secondary/10 text-secondary text-[10px] px-2 py-0.5 rounded-full border border-secondary/20 font-bold uppercase tracking-tighter">Recommended</span>
</div>
<p class="text-sm text-on-surface-variant mt-1">Full context, expert analysis &amp; multi-source verification.</p>
</div>
</div>
<!-- Selection Indicator -->
<div class="absolute top-4 right-4">
<span class="material-symbols-outlined text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 3: The Infinite -->
<button class="w-full text-left group relative p-6 glass-panel rounded-lg border border-white/5 transition-all duration-300 hover:bg-surface-container-highest/60 hover:border-white/10 active:scale-[0.98]">
<div class="flex items-center gap-6">
<div class="h-14 w-14 rounded-full bg-surface-container flex items-center justify-center text-secondary-dim group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-3xl" data-icon="all_inclusive">all_inclusive</span>
</div>
<div>
<h3 class="text-xl font-headline font-semibold text-white">The Infinite <span class="text-on-surface-variant font-normal opacity-60">(Unrestricted)</span></h3>
<p class="text-sm text-on-surface-variant mt-1">Continuous AI curation based on your real-time interests.</p>
</div>
</div>
</button>
</div>
<!-- Decorative AI Visual Element -->
<div class="mt-16 flex justify-center">
<div class="relative w-48 h-1 opacity-20">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-secondary to-transparent blur-sm"></div>
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-primary to-transparent animate-pulse"></div>
</div>
</div>
</main>
<!-- Navigation Shell / Bottom Action -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black via-black/90 to-transparent z-40">
<div class="max-w-2xl mx-auto flex items-center justify-between gap-4">
<button class="text-on-surface-variant font-medium px-6 py-4 hover:text-white transition-colors">
                Skip
            </button>
<button class="flex-1 bg-gradient-to-r from-primary to-secondary text-black font-bold py-4 rounded-lg shadow-[0_10px_30px_rgba(124,77,255,0.3)] hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-2">
                Next
                <span class="material-symbols-outlined text-lg" data-icon="east">east</span>
</button>
</div>
</footer>
<!-- Invisible background elements for depth -->
<div class="fixed top-[20%] right-[-10%] w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] pointer-events-none z-[-1]"></div>
<div class="fixed bottom-[10%] left-[-10%] w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[100px] pointer-events-none z-[-1]"></div>
</body></html>
